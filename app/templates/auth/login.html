<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SymbiCircle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white shadow-2xl rounded-2xl flex max-w-4xl w-full overflow-hidden border border-slate-200">
        <div class="hidden md:flex md:w-1/2 bg-blue-600 p-12 flex-col justify-center text-white">
            <h1 class="text-4xl font-bold mb-4 italic">SymbiCircle</h1>
            <p class="text-blue-100 text-lg">Log in to reconnect with your branch mates and discover new collaborators.</p>
        </div>

        <div class="w-full md:w-1/2 p-8 lg:p-12">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-800">Welcome Back</h2>
                <p class="text-slate-500 text-sm">Enter your SIT credentials to continue.</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">SIT Email</label>
                    <input type="email" id="username" required placeholder="firstname.lastname.btech2024@sitpune.edu.in"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required placeholder="••••••••"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95">
                    Log In
                </button>
            </form>

            <p class="mt-8 text-center text-sm text-slate-600">
                Don't have an account? <a href="/register" class="text-blue-600 font-semibold hover:underline">Register here</a>
            </p>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
