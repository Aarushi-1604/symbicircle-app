<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Your Skills | SymbiCircle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white shadow-xl rounded-2xl p-8 max-w-lg w-full border border-slate-200">
        <h2 class="text-2xl font-bold text-slate-800">What are you good at?</h2>
        <p class="text-slate-500 text-sm mb-6">Select at least <span class="font-bold text-blue-600">5 skills</span> to join the circle.</p>

        <div id="skillsContainer" class="flex flex-wrap gap-2 mb-4 p-3 min-h-[50px] bg-slate-50 rounded-lg border border-dashed border-slate-300">
            </div>

        <div class="relative">
            <input type="text" id="skillInput" placeholder="Search skills (e.g. Python, Figma...)"
                   class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">

            <div id="suggestions" class="absolute z-10 w-full bg-white shadow-lg rounded-b-lg border border-t-0 border-slate-200 hidden max-h-48 overflow-y-auto">
                </div>
        </div>

        <button id="finishBtn" disabled
                class="w-full mt-8 bg-slate-300 text-white font-bold py-3 rounded-lg cursor-not-allowed transition duration-200">
            Complete Registration (0/5)
        </button>
    </div>

    <script src="/static/js/skills_picker.js"></script>
</body>
</html>
