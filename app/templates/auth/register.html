<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SymbiCircle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white shadow-2xl rounded-2xl flex max-w-4xl w-full overflow-hidden border border-slate-200">
        <div class="hidden md:flex md:w-1/2 bg-blue-600 p-12 flex-col justify-between text-white">
            <div>
                <h1 class="text-4xl font-bold mb-4">SymbiCircle</h1>
                <p class="text-blue-100 text-lg">The exclusive skill-discovery network for SIT Pune students.</p>
            </div>
            <div class="space-y-4">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500 p-2 rounded-lg">✅</div>
                    <p>Verified @sitpune.edu.in accounts</p>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500 p-2 rounded-lg">🔍</div>
                    <p>Search by Branch, Batch, or Skill</p>
                </div>
            </div>
        </div>

        <div class="w-full md:w-1/2 p-8 lg:p-12">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-800">Create Account</h2>
                <p class="text-slate-500 text-sm">Step 1 of 2: Basic Information</p>
            </div>

            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="fullName" required placeholder="John Doe"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">SIT Email</label>
                    <input type="email" id="email" required placeholder="firstname.lastname.btech2024@sitpune.edu.in"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                    <p id="emailStatus" class="mt-1 text-xs hidden"></p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required minlength="8" placeholder="••••••••"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                    <p class="text-xs text-slate-400 mt-1">Must be at least 8 characters.</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Branch</label>
                        <select id="branch" class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-blue-500">
                            <option>AIML</option>
                            <option>CSE</option>
                            <option>ENTC</option>
                            <option>RNA</option>
                            <option>MECH</option>
                            <option>CIVIL</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Batch</label>
                        <select id="batch" class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-blue-500">
                            <option>2022-26</option>
                            <option>2023-27</option>
                            <option>2024-28</option>
                            <option>2025-29</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="nextBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95">
                    Next: Pick Your Skills
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-600">
                Already have an account? <a href="/login" class="text-blue-600 font-semibold hover:underline">Log in</a>
            </p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
